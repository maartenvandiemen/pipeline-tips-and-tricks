name: 03-Summary
on: 
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      NUGET_PACKAGES: '${{github.workspace}}/.nuget/packages'
    steps:    
    - uses: actions/checkout@v7

    - name: Retrieve version
      id: set-dotnet-version
      run: |
            # URL to the .NET release metadata
            $releasesUrl = "https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/releases-index.json"
              
            # Fetch and parse the JSON data
            $releasesData = Invoke-RestMethod -Uri $releasesUrl -UseBasicParsing
              
            # Filter for .NET 10 releases and get the latest version
            $dotNet10 = $releasesData."releases-index" | Where-Object { $_."channel-version" -like "10.0" }
            $latestNet10Sdk = $dotNet10."latest-sdk"

            # Output the latest information about .NET 10
            Write-Output "Latest .NET 10 SDK: $latestNet10Sdk"
            echo "DOTNET_VERSION=$latestNet10Sdk" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Generate list using Markdown
      run: |
        echo "Built using the following dynamic versions:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- .NET SDK: ${{steps.set-dotnet-version.outputs.DOTNET_VERSION}}" >> $GITHUB_STEP_SUMMARY
      shell: bash

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ steps.set-dotnet-version.outputs.DOTNET_VERSION }}

    - name: Dotnet restore
      run: dotnet restore --locked-mode --nologo
    
    - name: Dotnet build
      run: dotnet build --no-restore --configuration Release
